document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

g: 14px; --r-xl: 22px;\n  }\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: var(--font-sans);\n    font-size: 15px;\n    line-height: 1.65;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* ── Layout ── */\n  .wrap { max-width: 860px; margin: 0 auto; padding: 0 40px; }\n  .wrap-wide { max-width: 1040px; margin: 0 auto; padding: 0 40px; }\n  section { padding: 80px 0; border-bottom: 1px solid var(--border); }\n  section:last-of-type { border-bottom: none; }\n\n  /* ── Nav ── */\n  nav {\n    position: sticky; top: 0; z-index: 50;\n    background: oklch(12% 0.022 255 / 0.88);\n    backdrop-filter: blur(18px);\n    border-bottom: 1px solid var(--border);\n  }\n  .nav-inner {\n    max-width: 1040px; margin: 0 auto; padding: 0 40px;\n    height: 52px; display: flex; align-items: center; gap: 32px;\n  }\n  .nav-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }\n  .nav-wordmark { font-family: var(--font-sans); font-size: 15px; font-weight: 600; letter-spacing: -0.04em; }\n  .nav-wordmark .md  { color: var(--text); }\n  .nav-wordmark .blu { color: var(--blu); }\n  .nav-links { display: flex; gap: 24px; margin-left: auto; }\n  .nav-links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--text-muted); text-decoration: none; transition: color .15s; }\n  .nav-links a:hover { color: var(--text); }\n  .nav-badge {\n    font-family: var(--font-mono); font-size: 11px; padding: 3px 9px;\n    background: var(--blu-subtle); color: var(--blu-bright);\n    border: 1px solid oklch(62% 0.20 245 / 0.22); border-radius: 999px;\n    letter-spacing: 0.04em; text-decoration: none; transition: background .15s;\n  }\n  .nav-badge:hover { background: oklch(62% 0.20 245 / 0.16); }\n\n  /* ── Hero ── */\n  .hero {\n    padding: 96px 0 80px;\n    border-bottom: 1px solid var(--border);\n    position: relative; overflow: hidden;\n  }\n  .hero::before {\n    content: '';\n    position: absolute; top: -160px; right: -120px;\n    width: 500px; height: 500px;\n    background: radial-gradient(circle, oklch(62% 0.20 245 / 0.08) 0%, transparent 70%);\n    pointer-events: none;\n  }\n  .hero-mark {\n    display: inline-flex; align-items: center; gap: 10px;\n    margin-bottom: 40px;\n  }\n  .hero-eyebrow {\n    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em;\n    text-transform: uppercase; color: var(--text-dim);\n  }\n  .hero-title {\n    font-size: clamp(52px, 8vw, 88px);\n    font-weight: 700; letter-spacing: -0.048em; line-height: 1;\n    margin-bottom: 28px;\n  }\n  .hero-title .blu { color: var(--blu); }\n  .hero-lead {\n    font-size: 20px; font-weight: 400; color: var(--text-muted);\n    max-width: 520px; line-height: 1.6; margin-bottom: 44px;\n  }\n  .hero-lead strong { color: var(--text); font-weight: 500; }\n  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 52px; }\n  .btn {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-family: var(--font-sans); font-weight: 500; cursor: pointer;\n    border: none; transition: all .15s ease; text-decoration: none; letter-spacing: -0.01em;\n    font-size: 14px; padding: 10px 20px; border-radius: var(--r-md);\n  }\n  .btn-primary { background: var(--blu); color: white; }\n  .btn-primary:hover { background: var(--blu-bright); box-shadow: 0 0 24px 4px var(--blu-glow); transform: translateY(-1px); }\n  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }\n  .btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }\n\n  .hero-install {\n    display: flex; align-items: center; gap: 16px;\n    background: var(--bg-deep); border: 1px solid var(--border);\n    border-radius: var(--r-md); padding: 14px 20px;\n    max-width: 480px;\n  }\n  .hero-install-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--text-dim); flex-shrink: 0; }\n  .hero-install-cmd { font-family: var(--font-mono); font-size: 13px; color: var(--green); }\n  .copy-btn {\n    margin-left: auto; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em;\n    color: var(--text-dim); background: var(--surface); border: 1px solid var(--border);\n    border-radius: var(--r-sm); padding: 4px 8px; cursor: pointer; transition: color .15s, border-color .15s;\n    flex-shrink: 0;\n  }\n  .copy-btn:hover { color: var(--text); border-color: var(--border-hi); }\n\n  /* ── Section chrome ── */\n  .sec-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blu); margin-bottom: 10px; }\n  .sec-title { font-size: 30px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 8px; }\n  .sec-desc { color: var(--text-muted); max-width: 520px; margin-bottom: 44px; }\n\n  /* ── Problem ── */\n  .problem-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; margin-bottom: 40px; }\n  .problem-item {\n    background: var(--surface); border-radius: var(--r-md); padding: 28px 24px;\n  }\n  .problem-item p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }\n  .problem-item p strong { color: var(--text); font-weight: 500; }\n  .problem-number {\n    font-family: var(--font-mono); font-size: 11px; color: var(--blu);\n    letter-spacing: 0.08em; margin-bottom: 12px; display: block;\n  }\n  .solution-banner {\n    background: var(--blu-subtle); border: 1px solid oklch(62% 0.20 245 / 0.18);\n    border-radius: var(--r-lg); padding: 28px 32px;\n    display: flex; align-items: flex-start; gap: 20px;\n  }\n  .solution-banner-icon { flex-shrink: 0; margin-top: 2px; }\n  .solution-banner p { font-size: 16px; color: var(--text); line-height: 1.6; }\n  .solution-banner p em { color: var(--blu-bright); font-style: normal; font-weight: 500; }\n\n  /* ── How it works ── */\n  .how-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-bottom: 32px; }\n  .how-card { background: var(--surface); border-radius: var(--r-lg); padding: 32px; }\n  .how-card-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }\n  .how-card-title { font-size: 20px; font-weight: 600; letter-spacing: -0.025em; margin-bottom: 10px; }\n  .how-card-title code { font-family: var(--font-mono); font-size: 17px; color: var(--blu); }\n  .how-card p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }\n  .how-card p code { font-family: var(--font-mono); font-size: 12px; color: var(--text); background: var(--surface-hi); padding: 1px 5px; border-radius: 3px; }\n  .how-card-footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; }\n  .interdep {\n    display: flex; align-items: center; gap: 10px;\n    background: var(--bg-deep); border: 1px solid var(--border);\n    border-radius: var(--r-md); padding: 14px 20px;\n    font-size: 13px; color: var(--text-muted);\n  }\n  .interdep strong { color: var(--text); font-weight: 500; }\n\n  /* ── Templates ── */\n  .tpl-groups { display: flex; flex-direction: column; gap: 32px; }\n  .tpl-group-label {\n    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.10em;\n    text-transform: uppercase; color: var(--text-dim);\n    padding-bottom: 10px; border-bottom: 1px solid var(--border);\n    margin-bottom: 12px;\n  }\n  .tpl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }\n  .tpl-item {\n    background: var(--surface); border-radius: var(--r-md); padding: 18px 20px;\n    transition: background .15s, border-color .15s;\n    cursor: default;\n  }\n  .tpl-item:hover { background: var(--surface-hi); }\n  .tpl-name { font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: var(--blu-bright); margin-bottom: 5px; }\n  .tpl-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }\n  .tpl-tags { display: flex; flex-wrap: wrap; gap: 4px; }\n  .tag {\n    font-family: var(--font-mono); font-size: 10px; padding: 2px 7px;\n    background: var(--surface-hi); color: var(--text-dim);\n    border: 1px solid var(--border); border-radius: var(--r-sm); letter-spacing: 0.03em;\n  }\n  .tag-blu { background: var(--blu-subtle); color: var(--blu); border-color: oklch(62% 0.20 245 / 0.20); }\n\n  /* ── CLI ── */\n  .cli-commands { display: flex; flex-direction: column; gap: 2px; margin-bottom: 32px; }\n  .cli-block { background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }\n  .cli-header {\n    display: flex; align-items: center; gap: 10px;\n    padding: 10px 18px; background: var(--surface); border-bottom: 1px solid var(--border);\n  }\n  .cli-dots { display: flex; gap: 5px; }\n  .cli-dot { width: 9px; height: 9px; border-radius: 50%; }\n  .cli-cmd-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; margin-left: 6px; }\n  .cli-badge { margin-left: auto; font-family: var(--font-mono); font-size: 10px; padding: 2px 8px; border-radius: 999px; letter-spacing: 0.04em; }\n  .cli-badge-blu { background: var(--blu-subtle); color: var(--blu-bright); border: 1px solid oklch(62% 0.20 245 / 0.22); }\n  .cli-badge-green { background: oklch(70% 0.17 155 / 0.10); color: var(--green); border: 1px solid oklch(70% 0.17 155 / 0.22); }\n  pre {\n    padding: 18px 22px; font-family: var(--font-mono); font-size: 13px;\n    line-height: 1.75; color: var(--text-muted); overflow-x: auto; tab-size: 2;\n  }\n  .p { color: oklch(75% 0.12 280); } /* prompt */\n  .g { color: var(--green); }\n  .b { color: var(--blu-bright); }\n  .d { color: var(--text-dim); font-style: italic; }\n  .a { color: var(--amber); }\n  .scaffold-output {\n    background: var(--surface); border-radius: var(--r-md); padding: 20px 24px;\n    font-family: var(--font-mono); font-size: 13px; line-height: 1.8;\n    color: var(--text-muted); margin-bottom: 8px;\n  }\n  .scaffold-output .dir { color: var(--blu); }\n  .scaffold-output .cmt { color: var(--text-dim); }\n\n  /* ── MCP ── */\n  .mcp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-bottom: 24px; }\n  .mcp-card { background: var(--surface); border-radius: var(--r-lg); padding: 28px; }\n  .mcp-card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }\n  .mcp-card-sub { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); letter-spacing: 0.03em; margin-bottom: 16px; }\n  .mcp-tools { display: flex; flex-direction: column; gap: 2px; }\n  .mcp-tool {\n    display: flex; align-items: flex-start; gap: 12px;\n    padding: 12px 14px; background: var(--bg-deep);\n    border-radius: var(--r-md); border: 1px solid var(--border);\n  }\n  .mcp-tool-kind {\n    font-family: var(--font-mono); font-size: 10px; padding: 2px 7px;\n    border-radius: 999px; letter-spacing: 0.04em; flex-shrink: 0; margin-top: 1px;\n  }\n  .kind-tool   { background: var(--blu-subtle); color: var(--blu-bright); border: 1px solid oklch(62% 0.20 245 / 0.22); }\n  .kind-prompt { background: oklch(72% 0.16 285 / 0.10); color: oklch(72% 0.16 285); border: 1px solid oklch(72% 0.16 285 / 0.22); }\n  .mcp-tool-info {}\n  .mcp-tool-name { font-family: var(--font-mono); font-size: 12px; color: var(--text); margin-bottom: 2px; }\n  .mcp-tool-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }\n  .mcp-url {\n    display: flex; align-items: center; gap: 12px;\n    background: var(--bg-deep); border: 1px solid var(--border);\n    border-radius: var(--r-md); padding: 14px 18px;\n    font-family: var(--font-mono); font-size: 13px;\n  }\n  .mcp-url-label { color: var(--text-dim); font-size: 11px; letter-spacing: 0.06em; flex-shrink: 0; }\n  .mcp-url-val { color: var(--blu-bright); }\n  .mcp-url-badge { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 999px; background: oklch(70% 0.17 155 / 0.10); color: var(--green); border: 1px solid oklch(70% 0.17 155 / 0.22); font-family: var(--font-mono); letter-spacing: 0.04em; }\n\n  /* ── Usage ── */\n  .usage-convos { display: flex; flex-direction: column; gap: 2px; }\n  .convo { display: flex; flex-direction: column; gap: 2px; background: var(--surface); border-radius: var(--r-lg); padding: 24px; }\n  .convo-msg {\n    display: flex; align-items: flex-start; gap: 12px;\n    padding: 10px 14px; border-radius: var(--r-md);\n  }\n  .convo-msg.human { background: var(--bg-deep); border: 1px solid var(--border); }\n  .convo-msg.agent { border: 1px solid var(--blu-subtle); background: var(--blu-subtle); }\n  .convo-role { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0; margin-top: 1px; width: 44px; }\n  .convo-msg.human .convo-role { color: var(--text-dim); }\n  .convo-msg.agent .convo-role { color: var(--blu); }\n  .convo-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }\n  .convo-msg.agent .convo-text { color: var(--text); }\n  .convo-text code { font-family: var(--font-mono); font-size: 11px; color: var(--blu-bright); background: oklch(62% 0.20 245 / 0.12); padding: 1px 5px; border-radius: 3px; }\n\n  /* ── Contribute ── */\n  .steps { display: flex; flex-direction: column; gap: 2px; }\n  .step {\n    display: flex; align-items: flex-start; gap: 18px;\n    padding: 18px 20px; background: var(--surface); border-radius: var(--r-md);\n  }\n  .step-num {\n    width: 28px; height: 28px; border-radius: 50%;\n    background: var(--blu-subtle); border: 1px solid oklch(62% 0.20 245 / 0.22);\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--font-mono); font-size: 11px; color: var(--blu);\n    flex-shrink: 0; font-weight: 500;\n  }\n  .step-body { flex: 1; }\n  .step-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 3px; }\n  .step-desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; }\n  .step-desc code { font-family: var(--font-mono); font-size: 11px; color: var(--text); background: var(--surface-hi); padding: 1px 5px; border-radius: 3px; }\n  .rule-box {\n    margin-top: 20px; padding: 16px 20px;\n    background: var(--bg-deep); border: 1px solid var(--border); border-left: 3px solid var(--blu);\n    border-radius: var(--r-sm); font-size: 13px; color: var(--text-muted); line-height: 1.6;\n  }\n  .rule-box strong { color: var(--text); font-weight: 500; }\n\n  /* ── Principles ── */\n  .principles { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }\n  .principle { background: var(--surface); border-radius: var(--r-md); padding: 24px; }\n  .principle-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 6px; }\n  .principle-desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; }\n  .principle-desc code { font-family: var(--font-mono); font-size: 11px; color: var(--text); background: var(--surface-hi); padding: 1px 5px; border-radius: 3px; }\n\n  /* ── Footer ── */\n  footer {\n    padding: 40px 0;\n    display: flex; align-items: center; justify-content: space-between;\n    flex-wrap: wrap; gap: 16px;\n  }\n  .footer-logo { display: flex; align-items: center; gap: 9px; }\n  .footer-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; }\n  .footer-links { display: flex; gap: 20px; }\n  .footer-links a { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-decoration: none; letter-spacing: 0.04em; transition: color .15s; }\n  .footer-links a:hover { color: var(--blu); }\n\n  /* Scrollbar */\n  ::-webkit-scrollbar { width: 5px; height: 5px; }\n  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 99px; }\n\n  /* Tweaks panel */\n  #tweaks-panel {\n    display: none; position: fixed; bottom: 24px; right: 24px;\n    background: var(--surface); border: 1px solid var(--border-hi);\n    border-radius: var(--r-lg); padding: 20px; width: 230px; z-index: 200;\n    box-shadow: 0 16px 48px oklch(0% 0 0 / 0.5); font-size: 13px;\n  }\n  #tweaks-panel h4 { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }\n  .tw-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }\n  .tw-row label { font-size: 12px; color: var(--text-muted); }\n  .tw-row input[type=color] { width: 100%; height: 30px; border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--bg); cursor: pointer; padding: 2px; }\n  .tw-row select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 5px 8px; font-family: var(--font-mono); font-size: 11px; }\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n\n<nav>\n  <div class=\"nav-inner\">\n    <a href=\"#\" class=\"nav-logo\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 44 44\" fill=\"none\">\n        <rect width=\"44\" height=\"44\" rx=\"10\" fill=\"oklch(62% 0.20 245)\"><\u002Frect>\n        <rect x=\"10\" y=\"14\" width=\"24\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.95\"><\u002Frect>\n        <rect x=\"10\" y=\"21\" width=\"18\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.65\"><\u002Frect>\n        <rect x=\"10\" y=\"28\" width=\"21\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.45\"><\u002Frect>\n      <\u002Fsvg>\n      <span class=\"nav-wordmark\"><span class=\"md\">md<\u002Fspan><span class=\"blu\">blu<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#how\">How it works<\u002Fa>\n      <a href=\"#templates\">Templates<\u002Fa>\n      <a href=\"#cli\">CLI<\u002Fa>\n      <a href=\"#mcp\">MCP<\u002Fa>\n      <a href=\"#contribute\">Contribute<\u002Fa>\n    <\u002Fdiv>\n    <a href=\"https://github.com/ruco-ai/mdblu\" class=\"nav-badge\" target=\"_blank\">GitHub ↗<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<div class=\"hero\">\n  <div class=\"wrap\">\n    <div class=\"hero-mark\">\n      <svg width=\"40\" height=\"40\" viewBox=\"0 0 44 44\" fill=\"none\">\n        <rect width=\"44\" height=\"44\" rx=\"10\" fill=\"oklch(62% 0.20 245)\"><\u002Frect>\n        <rect x=\"10\" y=\"14\" width=\"24\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.95\"><\u002Frect>\n        <rect x=\"10\" y=\"21\" width=\"18\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.65\"><\u002Frect>\n        <rect x=\"10\" y=\"28\" width=\"21\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.45\"><\u002Frect>\n      <\u002Fsvg>\n      <span class=\"hero-eyebrow\">ruco-ai / mdblu<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"hero-title\">md<span class=\"blu\">blu<\u002Fspan><\u002Fh1>\n    <p class=\"hero-lead\">A <strong>shared language<\u002Fstrong> for humans and AI agents — structured Markdown templates that standardize how teams communicate during software development, and an MCP server that makes them available to any AI tool, anywhere.<\u002Fp>\n    <div class=\"hero-ctas\">\n      <a href=\"#cli\" class=\"btn btn-primary\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"4 17 10 11 4 5\"><\u002Fpolyline><line x1=\"12\" y1=\"19\" x2=\"20\" y2=\"19\"><\u002Fline><\u002Fsvg>\n        Get started\n      <\u002Fa>\n      <a href=\"https://mdblu.fly.dev/mcp\" class=\"btn btn-ghost\" target=\"_blank\">MCP server ↗<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"hero-install\">\n      <span class=\"hero-install-label\">npm<\u002Fspan>\n      <span class=\"hero-install-cmd\">npm install -g @ruco-ai/mdblu<\u002Fspan>\n      <button class=\"copy-btn\" onclick=\"navigator.clipboard.writeText('npm install -g @ruco-ai/mdblu');this.textContent='copied';setTimeout(()=&gt;this.textContent='copy',1500)\">copy<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PROBLEM -->\n<section>\n  <div class=\"wrap\">\n    <p class=\"sec-label\">The problem<\u002Fp>\n    <h2 class=\"sec-title\">AI agents are context-starved<\u002Fh2>\n    <p class=\"sec-desc\">Every session starts cold. Every handoff loses something. Every team reinvents the wheel.<\u002Fp>\n    <div class=\"problem-grid\">\n      <div class=\"problem-item\">\n        <span class=\"problem-number\">01<\u002Fspan>\n        <p><strong>Cold starts.<\u002Fstrong> Every new session, the agent has no memory of prior work, conventions, or decisions.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"problem-item\">\n        <span class=\"problem-number\">02<\u002Fspan>\n        <p><strong>Lossy handoffs.<\u002Fstrong> Context evaporates between sessions, between agents, and between humans and tools.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"problem-item\">\n        <span class=\"problem-number\">03<\u002Fspan>\n        <p><strong>No common vocabulary.<\u002Fstrong> Every team invents its own format for specs, missions, and handoffs — none of it machine-readable.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"solution-banner\">\n      <div class=\"solution-banner-icon\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"oklch(62% 0.20 245)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <p>mdblu fixes this by giving agents a common vocabulary: templates that define <em>what to produce<\u002Fem>, <em>when to produce it<\u002Fem>, and <em>how to fill it in correctly<\u002Fem> — at every phase of the development lifecycle.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section id=\"how\">\n  <div class=\"wrap\">\n    <p class=\"sec-label\">How it works<\u002Fp>\n    <h2 class=\"sec-title\">Two parts, one system<\u002Fh2>\n    <p class=\"sec-desc\">Templates and CLAUDE.md are interdependent — every template change must be paired with a CLAUDE.md update.<\u002Fp>\n    <div class=\"how-grid\">\n      <div class=\"how-card\">\n        <p class=\"how-card-eyebrow\">Part one<\u002Fp>\n        <h3 class=\"how-card-title\">Templates<\u002Fh3>\n        <p>Structured <code>.md<\u002Fcode> files for every phase of development: planning, implementation, handoff, and documentation. Each template has explicit instructions for the AI embedded as HTML comments — stripped from the final output.<\u002Fp>\n        <div class=\"how-card-footer\">17 templates · /templates · open source<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"how-card\">\n        <p class=\"how-card-eyebrow\">Part two<\u002Fp>\n        <h3 class=\"how-card-title\"><code>CLAUDE.md<\u002Fcode><\u002Fh3>\n        <p>A meta-template that tells any AI agent <em>which<\u002Fem> template to use and <em>when<\u002Fem>. It's the decision layer that connects the right document to the right moment — the router between intent and output.<\u002Fp>\n        <div class=\"how-card-footer\">the decision layer · always paired with templates<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"interdep\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"oklch(62% 0.20 245)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg>\n      <span><strong>Rule:<\u002Fstrong> templates without a corresponding CLAUDE.md entry won't be used correctly by agents. They are always a pair.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TEMPLATES -->\n<section id=\"templates\">\n  <div class=\"wrap-wide\">\n    <p class=\"sec-label\">Templates<\u002Fp>\n    <h2 class=\"sec-title\">Every phase, covered<\u002Fh2>\n    <p class=\"sec-desc\">All templates include YAML frontmatter with <code style=\"font-family:var(--font-mono);font-size:12px;color:var(--text);background:var(--surface-hi);padding:1px 5px;border-radius:3px;\">title<\u002Fcode>, <code style=\"font-family:var(--font-mono);font-size:12px;color:var(--text);background:var(--surface-hi);padding:1px 5px;border-radius:3px;\">type<\u002Fcode>, and <code style=\"font-family:var(--font-mono);font-size:12px;color:var(--text);background:var(--surface-hi);padding:1px 5px;border-radius:3px;\">tags<\u002Fcode> fields, enabling tools and agents to filter and index by metadata.<\u002Fp>\n    <div class=\"tpl-groups\">\n\n      <div>\n        <p class=\"tpl-group-label\">Planning &amp; scoping<\u002Fp>\n        <div class=\"tpl-grid\">\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">SPEC.md<\u002Fp>\n            <p class=\"tpl-desc\">Plan a feature end-to-end before touching code.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">planning<\u002Fspan><span class=\"tag tag-blu\">specification<\u002Fspan><span class=\"tag tag-blu\">scoping<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">MISSION.md<\u002Fp>\n            <p class=\"tpl-desc\">Scope a single, concrete agent task.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">planning<\u002Fspan><span class=\"tag tag-blu\">scoping<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">BOOTSTRAP.md<\u002Fp>\n            <p class=\"tpl-desc\">Decompose a SPEC into an ordered, tagged task list.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">planning<\u002Fspan><span class=\"tag tag-blu\">task-management<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">OPEN-QUESTIONS.md<\u002Fp>\n            <p class=\"tpl-desc\">Surface blockers that only the developer can resolve.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">planning<\u002Fspan><span class=\"tag tag-blu\">scoping<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">TODO.md<\u002Fp>\n            <p class=\"tpl-desc\">Simple standalone task list, not tied to a mission.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">task-management<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">GH-PROJECT.md<\u002Fp>\n            <p class=\"tpl-desc\">Define a GitHub Project with fields, items, and owners.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">task-management<\u002Fspan><span class=\"tag tag-blu\">planning<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <p class=\"tpl-group-label\">During implementation<\u002Fp>\n        <div class=\"tpl-grid\">\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">CODING-NOTES.md<\u002Fp>\n            <p class=\"tpl-desc\">Establish conventions, error handling, and file order at session start.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">implementation<\u002Fspan><span class=\"tag tag-blu\">conventions<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">CLAUDE.md<\u002Fp>\n            <p class=\"tpl-desc\">Give any AI agent the minimal context it needs for a repo.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">agent-context<\u002Fspan><span class=\"tag tag-blu\">reference<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <p class=\"tpl-group-label\">After implementation<\u002Fp>\n        <div class=\"tpl-grid\">\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">HANDOFF.md<\u002Fp>\n            <p class=\"tpl-desc\">Document v1 so a developer can take it forward.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">handoff<\u002Fspan><span class=\"tag tag-blu\">documentation<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">MISSION-REPORT.md<\u002Fp>\n            <p class=\"tpl-desc\">Close out a completed mission with outcomes and lessons.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag tag-blu\">reporting<\u002Fspan><span class=\"tag tag-blu\">retrospective<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <p class=\"tpl-group-label\">Documentation &amp; reference<\u002Fp>\n        <div class=\"tpl-grid\">\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">README.md<\u002Fp>\n            <p class=\"tpl-desc\">Generate a project README from a description.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag\">documentation<\u002Fspan><span class=\"tag\">reference<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">DEV.md<\u002Fp>\n            <p class=\"tpl-desc\">Generate a developer guide for an existing or planned project.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag\">documentation<\u002Fspan><span class=\"tag\">developer-guide<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">ARCHITECTURE.md<\u002Fp>\n            <p class=\"tpl-desc\">Document high-level system architecture and data flow.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag\">architecture<\u002Fspan><span class=\"tag\">reference<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">STRUCTURE.md<\u002Fp>\n            <p class=\"tpl-desc\">Document internal codebase layout, more granular than ARCHITECTURE.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag\">architecture<\u002Fspan><span class=\"tag\">reference<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">ADR.md<\u002Fp>\n            <p class=\"tpl-desc\">Record a single architectural decision with rationale.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag\">architecture<\u002Fspan><span class=\"tag\">decision<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">PLAYBOOK.md<\u002Fp>\n            <p class=\"tpl-desc\">Write a repeatable operational procedure or runbook.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag\">runbook<\u002Fspan><span class=\"tag\">documentation<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tpl-item\">\n            <p class=\"tpl-name\">SKILL.md<\u002Fp>\n            <p class=\"tpl-desc\">Document a reusable AI agent capability and its interface.<\u002Fp>\n            <div class=\"tpl-tags\"><span class=\"tag\">agent-skill<\u002Fspan><span class=\"tag\">documentation<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CLI -->\n<section id=\"cli\">\n  <div class=\"wrap\">\n    <p class=\"sec-label\">CLI<\u002Fp>\n    <h2 class=\"sec-title\">Scaffold from the terminal<\u002Fh2>\n    <p class=\"sec-desc\">mdblu ships as an npm package with zero runtime dependencies. Requires Node ≥ 18.<\u002Fp>\n\n    <div class=\"cli-commands\">\n      <!-- install -->\n      <div class=\"cli-block\">\n        <div class=\"cli-header\">\n          <div class=\"cli-dots\"><div class=\"cli-dot\" style=\"background:oklch(62% 0.20 20)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(74% 0.17 80)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(70% 0.17 155)\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"cli-cmd-label\">Install<\u002Fspan>\n          <span class=\"cli-badge cli-badge-green\">one-time<\u002Fspan>\n        <\u002Fdiv>\n<pre><span class=\"p\">$<\u002Fspan> <span class=\"g\">npm install -g @ruco-ai/mdblu<\u002Fspan>\n<span class=\"d\"># or without installing:<\u002Fspan>\n<span class=\"p\">$<\u002Fspan> <span class=\"g\">npx @ruco-ai/mdblu<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- list -->\n      <div class=\"cli-block\">\n        <div class=\"cli-header\">\n          <div class=\"cli-dots\"><div class=\"cli-dot\" style=\"background:oklch(62% 0.20 20)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(74% 0.17 80)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(70% 0.17 155)\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"cli-cmd-label\">List all templates<\u002Fspan>\n          <span class=\"cli-badge cli-badge-blu\">mdblu list<\u002Fspan>\n        <\u002Fdiv>\n<pre><span class=\"p\">$<\u002Fspan> mdblu <span class=\"b\">list<\u002Fspan>\n<span class=\"d\">→ fetching templates from github.com/ruco-ai/mdblu…<\u002Fspan>\n\n  <span class=\"a\">01<\u002Fspan>  SPEC.md            Plan a feature end-to-end\n  <span class=\"a\">02<\u002Fspan>  MISSION.md         Scope a single agent task\n  <span class=\"a\">03<\u002Fspan>  BOOTSTRAP.md       Decompose a SPEC into tasks\n  <span class=\"d\">     …14 more<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- get -->\n      <div class=\"cli-block\">\n        <div class=\"cli-header\">\n          <div class=\"cli-dots\"><div class=\"cli-dot\" style=\"background:oklch(62% 0.20 20)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(74% 0.17 80)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(70% 0.17 155)\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"cli-cmd-label\">Download specific templates<\u002Fspan>\n          <span class=\"cli-badge cli-badge-blu\">mdblu get<\u002Fspan>\n        <\u002Fdiv>\n<pre><span class=\"p\">$<\u002Fspan> mdblu <span class=\"b\">get<\u002Fspan> SPEC.md MISSION.md\n<span class=\"d\">✓  SPEC.md        → .mdblu/templates/SPEC.md.template<\u002Fspan>\n<span class=\"d\">✓  MISSION.md     → .mdblu/templates/MISSION.md.template<\u002Fspan>\n<span class=\"d\">✓  CLAUDE.md      → .mdblu/CLAUDE.md<\u002Fspan>\n\n<span class=\"d\"># use --output to scaffold into a custom directory:<\u002Fspan>\n<span class=\"p\">$<\u002Fspan> mdblu <span class=\"b\">get<\u002Fspan> SPEC.md MISSION.md <span class=\"a\">--output<\u002Fspan> my-docs/\n\n<span class=\"d\"># download all templates:<\u002Fspan>\n<span class=\"p\">$<\u002Fspan> mdblu <span class=\"b\">get --all<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- update -->\n      <div class=\"cli-block\">\n        <div class=\"cli-header\">\n          <div class=\"cli-dots\"><div class=\"cli-dot\" style=\"background:oklch(62% 0.20 20)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(74% 0.17 80)\"><\u002Fdiv><div class=\"cli-dot\" style=\"background:oklch(70% 0.17 155)\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"cli-cmd-label\">Update scaffolded templates<\u002Fspan>\n          <span class=\"cli-badge cli-badge-blu\">mdblu update<\u002Fspan>\n        <\u002Fdiv>\n<pre><span class=\"p\">$<\u002Fspan> mdblu <span class=\"b\">update<\u002Fspan>\n<span class=\"d\">✓  SPEC.md        updated<\u002Fspan>\n<span class=\"d\">✓  MISSION.md     updated<\u002Fspan>\n<span class=\"d\">–  HANDOFF.md     skipped (not found upstream)<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;\">Scaffold output<\u002Fp>\n    <div class=\"scaffold-output\">\n      <span class=\"dir\">.mdblu/<\u002Fspan>          <span class=\"cmt\">← defaults to .mdblu/ (override with --output)<\u002Fspan><br>\n      &nbsp;&nbsp;<span class=\"dir\">templates/<\u002Fspan>      <span class=\"cmt\">← downloaded .template files<\u002Fspan><br>\n      &nbsp;&nbsp;CLAUDE.md        <span class=\"cmt\">← always written<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MCP -->\n<section id=\"mcp\">\n  <div class=\"wrap\">\n    <p class=\"sec-label\">MCP Server<\u002Fp>\n    <h2 class=\"sec-title\">Connect any AI tool<\u002Fh2>\n    <p class=\"sec-desc\">mdblu runs as an MCP server — any MCP-compatible client can pull templates on demand. No redeploy when templates change. Responses cached for 5 minutes.<\u002Fp>\n\n    <div class=\"mcp-grid\" style=\"margin-bottom:24px;\">\n      <!-- Claude Code -->\n      <div class=\"mcp-card\">\n        <p class=\"mcp-card-title\">Claude Code<\u002Fp>\n        <p class=\"mcp-card-sub\">claude mcp add · transport http<\u002Fp>\n        <div class=\"cli-block\">\n<pre style=\"padding:14px 18px;font-size:12px;\"><span class=\"p\">$<\u002Fspan> claude mcp add \\\n    <span class=\"a\">--transport<\u002Fspan> http \\\n    @ruco-ai/mdblu \\\n    <span class=\"g\">https://mdblu.fly.dev/mcp<\u002Fspan><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Claude Desktop -->\n      <div class=\"mcp-card\">\n        <p class=\"mcp-card-title\">Claude Desktop<\u002Fp>\n        <p class=\"mcp-card-sub\">claude_desktop_config.json<\u002Fp>\n        <div class=\"cli-block\">\n<pre style=\"padding:14px 18px;font-size:12px;\"><span class=\"d\">{<\u002Fspan>\n  <span class=\"b\">\"mcpServers\"<\u002Fspan><span class=\"d\">: {<\u002Fspan>\n    <span class=\"b\">\"mdblu\"<\u002Fspan><span class=\"d\">: {<\u002Fspan>\n      <span class=\"b\">\"type\"<\u002Fspan><span class=\"d\">:<\u002Fspan> <span class=\"g\">\"http\"<\u002Fspan><span class=\"d\">,<\u002Fspan>\n      <span class=\"b\">\"url\"<\u002Fspan><span class=\"d\">:<\u002Fspan>  <span class=\"g\">\"https://mdblu.fly.dev/mcp\"<\u002Fspan>\n    <span class=\"d\">}<\u002Fspan>\n  <span class=\"d\">}<\u002Fspan>\n<span class=\"d\">}<\u002Fspan><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mcp-url\" style=\"margin-bottom:32px;\">\n      <span class=\"mcp-url-label\">endpoint<\u002Fspan>\n      <span class=\"mcp-url-val\">https://mdblu.fly.dev/mcp<\u002Fspan>\n      <span class=\"mcp-url-badge\">no auth · http<\u002Fspan>\n    <\u002Fdiv>\n\n    <p style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;\">Available tools &amp; prompts<\u002Fp>\n    <div class=\"mcp-tools\">\n      <div class=\"mcp-tool\">\n        <span class=\"mcp-tool-kind kind-tool\">tool<\u002Fspan>\n        <div class=\"mcp-tool-info\"><p class=\"mcp-tool-name\">list_templates<\u002Fp><p class=\"mcp-tool-desc\">List all available templates<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mcp-tool\">\n        <span class=\"mcp-tool-kind kind-tool\">tool<\u002Fspan>\n        <div class=\"mcp-tool-info\"><p class=\"mcp-tool-name\">get_template<\u002Fp><p class=\"mcp-tool-desc\">Fetch a template by name<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mcp-tool\">\n        <span class=\"mcp-tool-kind kind-tool\">tool<\u002Fspan>\n        <div class=\"mcp-tool-info\"><p class=\"mcp-tool-name\">propose_template_update<\u002Fp><p class=\"mcp-tool-desc\">Open a GitHub PR with an improved version of a template<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mcp-tool\">\n        <span class=\"mcp-tool-kind kind-prompt\">prompt<\u002Fspan>\n        <div class=\"mcp-tool-info\"><p class=\"mcp-tool-name\">how_to_use<\u002Fp><p class=\"mcp-tool-desc\">Instructs the agent to pick and fill the right template<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mcp-tool\">\n        <span class=\"mcp-tool-kind kind-prompt\">prompt<\u002Fspan>\n        <div class=\"mcp-tool-info\"><p class=\"mcp-tool-name\">propose_update<\u002Fp><p class=\"mcp-tool-desc\">Instructs the agent to critically evaluate and propose a template improvement<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- USAGE -->\n<section>\n  <div class=\"wrap\">\n    <p class=\"sec-label\">Usage<\u002Fp>\n    <h2 class=\"sec-title\">Ask your agent<\u002Fh2>\n    <p class=\"sec-desc\">Once connected, your agent selects the right template, fills every section, strips HTML comments, and returns a clean structured document.<\u002Fp>\n    <div class=\"usage-convos\">\n      <div class=\"convo\">\n        <div class=\"convo-msg human\">\n          <span class=\"convo-role\">you<\u002Fspan>\n          <span class=\"convo-text\">Write a SPEC for the new notifications system.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"convo-msg agent\">\n          <span class=\"convo-role\">agent<\u002Fspan>\n          <span class=\"convo-text\">Using <code>SPEC.md<\u002Fcode> — filling: overview, data model, API surface, error handling, open questions…<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"convo\">\n        <div class=\"convo-msg human\">\n          <span class=\"convo-role\">you<\u002Fspan>\n          <span class=\"convo-text\">Create a MISSION for migrating the auth module.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"convo-msg agent\">\n          <span class=\"convo-role\">agent<\u002Fspan>\n          <span class=\"convo-text\">Using <code>MISSION.md<\u002Fcode> — filling: goals, constraints, success criteria, deliverables, [BOT] / [HUMAN] checkpoints…<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"convo\">\n        <div class=\"convo-msg human\">\n          <span class=\"convo-role\">you<\u002Fspan>\n          <span class=\"convo-text\">Generate a HANDOFF for what we built today.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"convo-msg agent\">\n          <span class=\"convo-role\">agent<\u002Fspan>\n          <span class=\"convo-text\">Using <code>HANDOFF.md<\u002Fcode> — filling: what was built, how to run it, shortcuts, known issues, prioritized next steps…<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTRIBUTE -->\n<section id=\"contribute\">\n  <div class=\"wrap\">\n    <p class=\"sec-label\">Contributing<\u002Fp>\n    <h2 class=\"sec-title\">Open and collaborative<\u002Fh2>\n    <p class=\"sec-desc\">Templates are plain Markdown — readable, forkable, improvable. AI-assisted contributions are welcome via the <code style=\"font-family:var(--font-mono);font-size:12px;color:var(--text);background:var(--surface-hi);padding:1px 5px;border-radius:3px;\">propose_update<\u002Fcode> MCP prompt.<\u002Fp>\n    <div class=\"steps\">\n      <div class=\"step\"><div class=\"step-num\">1<\u002Fdiv><div class=\"step-body\"><p class=\"step-title\">Fork the repo<\u002Fp><p class=\"step-desc\"><code>github.com/ruco-ai/mdblu<\u002Fcode><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-num\">2<\u002Fdiv><div class=\"step-body\"><p class=\"step-title\">Add or edit the template<\u002Fp><p class=\"step-desc\">All templates live in <code>/templates<\u002Fcode> as <code>.md.template<\u002Fcode> files.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-num\">3<\u002Fdiv><div class=\"step-body\"><p class=\"step-title\">Update CLAUDE.md<\u002Fp><p class=\"step-desc\">Add or revise the entry that tells agents when and how to use the template.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-num\">4<\u002Fdiv><div class=\"step-body\"><p class=\"step-title\">Tag the frontmatter<\u002Fp><p class=\"step-desc\">Add tags from the taxonomy in <code>TAGS.md<\u002Fcode>. Update <code>TAGS.md<\u002Fcode> if introducing a new tag.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-num\">5<\u002Fdiv><div class=\"step-body\"><p class=\"step-title\">Open a PR<\u002Fp><p class=\"step-desc\">The verifier checks that templates and CLAUDE.md are always updated as a pair.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rule-box\">\n      <strong>Rule:<\u002Fstrong> every template change must be paired with a CLAUDE.md update. Templates without a corresponding CLAUDE.md entry won't be used correctly by agents.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRINCIPLES -->\n<section>\n  <div class=\"wrap\">\n    <p class=\"sec-label\">Design principles<\u002Fp>\n    <h2 class=\"sec-title\">How we build templates<\u002Fh2>\n    <p class=\"sec-desc\" style=\"margin-bottom:32px;\"><\u002Fp>\n    <div class=\"principles\">\n      <div class=\"principle\">\n        <p class=\"principle-title\">Fill every section.<\u002Fp>\n        <p class=\"principle-desc\">No placeholders, no empty cells, no \"TBD\" without a reason. Agents should produce complete documents from a single prompt.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <p class=\"principle-title\">Remove HTML comments from output.<\u002Fp>\n        <p class=\"principle-desc\">The <code>&lt;!-- ... --&gt;<\u002Fcode> blocks are instructions for the model, not content. The final document is clean Markdown.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <p class=\"principle-title\">Tag agent vs. human work.<\u002Fp>\n        <p class=\"principle-desc\"><code>[BOT]<\u002Fcode> for what an AI can do autonomously. <code>[HUMAN]<\u002Fcode> for checkpoints that require judgment. Never conflate the two.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <p class=\"principle-title\">Templates and CLAUDE.md are a pair.<\u002Fp>\n        <p class=\"principle-desc\">One without the other is incomplete. A template without a CLAUDE.md entry has no trigger — it won't be used at the right moment.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<div class=\"wrap-wide\">\n  <footer>\n    <div class=\"footer-logo\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 44 44\" fill=\"none\">\n        <rect width=\"44\" height=\"44\" rx=\"10\" fill=\"oklch(62% 0.20 245)\"><\u002Frect>\n        <rect x=\"10\" y=\"14\" width=\"24\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.95\"><\u002Frect>\n        <rect x=\"10\" y=\"21\" width=\"18\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.65\"><\u002Frect>\n        <rect x=\"10\" y=\"28\" width=\"21\" height=\"2.5\" rx=\"1.25\" fill=\"white\" opacity=\"0.45\"><\u002Frect>\n      <\u002Fsvg>\n      <span style=\"font-family:var(--font-sans);font-size:14px;font-weight:600;letter-spacing:-0.04em;\"><span style=\"color:var(--text)\">md<\u002Fspan><span style=\"color:var(--blu)\">blu<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"footer-links\">\n      <a href=\"https://github.com/ruco-ai/mdblu\" target=\"_blank\">GitHub<\u002Fa>\n      <a href=\"https://mdblu.fly.dev/mcp\" target=\"_blank\">MCP Server<\u002Fa>\n      <a href=\"https://github.com/ruco-ai/mdblu/tree/main/templates\" target=\"_blank\">Templates<\u002Fa>\n    <\u002Fdiv>\n    <p class=\"footer-meta\">MIT · ruco-ai · v1.0.0<\u002Fp>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div id=\"tweaks-panel\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tw-row\">\n    <label>Brand blue<\u002Flabel>\n    <input type=\"color\" id=\"tw-blu\" value=\"#4d8aff\">\n  <\u002Fdiv>\n  <div class=\"tw-row\">\n    <label>Template columns<\u002Flabel>\n    <select id=\"tw-cols\">\n      <option value=\"2\">2 columns<\u002Foption>\n      <option value=\"3\" selected=\"\">3 columns<\u002Foption>\n      <option value=\"4\">4 columns<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const panel = document.getElementById('tweaks-panel');\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode')   panel.style.display = 'block';\n    if (e.data?.type === '__deactivate_edit_mode') panel.style.display = 'none';\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\"bluHex\":\"#4d8aff\",\"cols\":3}/*EDITMODE-END*/;\n\n  function hexToOklch(hex) {\n    const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;\n    const L=Math.pow(.4122*r+.5363*g+.0514*b,1/3), M=Math.pow(.2119*r+.6807*g+.1074*b,1/3), S=Math.pow(.0883*r+.2817*g+.6299*b,1/3);\n    const l=L*.2104542553+M*.7936177850-S*.004072046, a2=L*1.9779984951-M*2.4285922050+S*.4505937099, b2=L*.025904037+M*.7827717662-S*.8086757660;\n    const C=Math.sqrt(a2*a2+b2*b2), h=Math.atan2(b2,a2)*180/Math.PI;\n    return `oklch(${(l*100).toFixed(0)}% ${C.toFixed(3)} ${((h+360)%360).toFixed(0)})`;\n  }\n\n  document.getElementById('tw-blu').addEventListener('input', function() {\n    document.documentElement.style.setProperty('--blu', hexToOklch(this.value));\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { bluHex: this.value } }, '*');\n  });\n  document.getElementById('tw-cols').addEventListener('change', function() {\n    document.querySelectorAll('.tpl-grid').forEach(g => g.style.gridTemplateColumns = `repeat(${this.value}, 1fr)`);\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { cols: Number(this.value) } }, '*');\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
